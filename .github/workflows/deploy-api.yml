name: Deploy API to ECS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/quixzoom-api:$IMAGE_TAG \
            -t $ECR_REGISTRY/quixzoom-api:latest .
          docker push $ECR_REGISTRY/quixzoom-api:$IMAGE_TAG
          docker push $ECR_REGISTRY/quixzoom-api:latest

      - name: Force ECS redeploy
        run: |
          aws ecs update-service \
            --cluster hypbit \
            --service quixzoom-api \
            --force-new-deployment \
            --region eu-north-1
